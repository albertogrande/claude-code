name: Deploy

# Builds the Astro site and publishes it to GitHub Pages. Runs on push to main,
# after an editorial workflow finishes (their bot commits do NOT trigger `push`,
# so the workflow_run trigger is what publishes scheduled updates), and on
# demand. Pages must be set to "GitHub Actions" as its source.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Scout", "Weekly", "Deep Dive"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
