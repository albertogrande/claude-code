name: Probes

# Quarterly marginal-value probes for the guide MCP. Claude Code follows
# mcp/eval/marginal-probes.md: poses each practice's decision question to a
# fresh no-tools subagent, grades the answers against the corpus, updates
# mcp/EVALS.md + the probe history + editorial memory. The retrieval
# regression eval then runs as a real gated workflow step (hermetic, against
# this checkout's build — not against production, which lags until Deploy
# runs). Failures open/comment a pipeline-failure issue.
#
# Requires repo secret CLAUDE_CODE_OAUTH_TOKEN (same as Scout/Weekly).

on:
  schedule:
    # 06:00 UTC on the 1st of Jan/Apr/Jul/Oct.
    - cron: "0 6 1 1,4,7,10 *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  issues: write

concurrency:
  group: main-writers
  cancel-in-progress: false

jobs:
  probes:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Run the marginal-value probes
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >
            Run the quarterly marginal-value probes following
            mcp/eval/marginal-probes.md exactly: read the current corpus from
            src/content/practices/ in this checkout, pose each practice's
            decision question (updating the question bank for added/retired
            practices) to a fresh subagent instructed to use NO tools and
            answer from its own knowledge, grade AGREE / PARTIAL /
            DIVERGE-UNKNOWN, then: stamp each practice's frontmatter in
            src/content/practices/ with its verdict (probe: {status:
            agree|partial|diverge, date: <today>}, matching the schema in
            src/content.config.ts), update the Eval 1 table and date in
            mcp/EVALS.md, append a History row in mcp/eval/marginal-probes.md
            (record which model was probed), and note practices that decayed
            to AGREE in editorial/MEMORY.md under Standing editorial findings
            so the weekly editor retires or refreshes them.
            The retrieval regression eval runs as a workflow step after you —
            do not run it yourself. Write files only — do not commit or push.
          show_full_output: true
          # Sonnet by choice: probing/grading is mechanical, and the probe
          # subject should be a mainstream model, not the strongest one.
          claude_args: >-
            --model claude-sonnet-5
            --max-turns 60
            --allowedTools "Task,Agent,WebFetch,Read,Write,Edit,Glob,Grep,Bash(date *),Bash(ls *)"

      - name: Run editorial gates
        uses: ./.github/actions/editorial-gates

      - name: Append usage ledger
        id: ledger
        env:
          EXEC_WRITER: ${{ steps.claude.outputs.execution_file }}
          MODEL: claude-sonnet-5
        run: |
          bash scripts/append-ledger.sh
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        uses: ./.github/actions/commit-and-push
        with:
          paths: mcp/ editorial/ src/content/practices/ usage/
          message: "Probes: quarterly marginal-value run ${{ steps.ledger.outputs.today }}"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
