name: CI

# Guards the build. A plain Astro build + Pagefind index on every PR and push;
# no Claude, no quota.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # check-sources diffs HEAD~1..HEAD to find changed content.
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      # Source liveness on content changed by this PR/push (no-op when the
      # diff touches no content).
      - run: node scripts/check-sources.mjs --changed

  # Guards the guide MCP server: e2e tests plus the retrieval-quality eval
  # (in-domain hit@3 ≥ 80% gate), both hermetic against a local dist build.
  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm ci
        working-directory: mcp
      - run: npm test
        working-directory: mcp
      - run: node eval/ci.mjs
        working-directory: mcp
