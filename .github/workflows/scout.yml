name: Scout

# Daily signals capture. Claude Code runs the daily-scout skill: it sweeps the
# official docs/changelog/releases and community for what's new, appends dated
# one-liners to signals/<week>.md, patches the guide when a hard fact changed,
# and lightly updates editorial memory. A second, fresh-context Claude pass
# then verifies the changed claims against primary sources, deterministic
# gates (site build + source liveness) run, and only then does the workflow
# commit with a rebase-safe push. Deploy publishes via its workflow_run
# trigger. Failures open/comment a pipeline-failure issue — never silent.
#
# Requires repo secret CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token` on a
# Claude Max/Pro login). Without it, the run no-ops with an error in the log.

on:
  schedule:
    # Daily at 05:00 UTC (night in Madrid). Off-peak so it doesn't compete with
    # interactive Max usage.
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      focus:
        description: "Optional focus for this sweep (e.g. 'the desktop app')"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  issues: write

# All main-writing workflows share one group so two writers never race a push.
concurrency:
  group: main-writers
  cancel-in-progress: false

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Capture today's signals
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >
            Run the daily-scout skill (.claude/skills/daily-scout/SKILL.md).
            ${{ github.event.inputs.focus && format('Focus this sweep on: {0}.', github.event.inputs.focus) || '' }}
            Sweep the last ~24h of Claude Code sources, append dated one-liners
            to signals/<week>.md, patch any guide section under src/content/guide/
            whose facts a change disproved, and update editorial/MEMORY.md lightly.
            Write files only — do not commit or push.
          show_full_output: true
          # Sonnet by choice: the sweep is short and mechanical; the site's
          # "switch to Fable" practice targets 30+ minute unattended *writing*
          # runs (weekly, deep dives), which do run on Fable.
          claude_args: >-
            --model claude-sonnet-5
            --max-turns 40
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash(date *),Bash(ls *)"

      - name: Detect content changes
        id: changes
        run: echo "n=$(git status --porcelain -- src signals editorial | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Verify changed claims (fact-integrity pass)
        id: verify
        if: steps.changes.outputs.n != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: >
            You are the fact-integrity gate for this repo's autonomous writer.
            The previous step edited content but nothing is committed yet. Run
            `git status --porcelain -- src/content signals` to list edited and
            new files, `git diff -- src/content signals` for the edits, and
            read new files in full. For every load-bearing factual claim added
            or changed — version numbers, feature availability, dates, pricing,
            quotes, shipped-vs-announced status — verify it against a primary
            public source with WebFetch/WebSearch. Fix what is wrong, revert
            what cannot be verified, and mark anything kept-but-unverified as
            such in the text ("reportedly", with its single source). Do not add
            new stories and do not restyle prose. Write files only — do not
            commit or push.
          show_full_output: true
          # A separate, fresh-context model checks the writer's claims — the
          # writer never grades its own homework.
          claude_args: >-
            --model claude-sonnet-5
            --max-turns 25
            --allowedTools "WebSearch,WebFetch,Read,Write,Edit,Glob,Grep,Bash(git status *),Bash(git diff *),Bash(date *),Bash(ls *)"

      - name: Gate — site builds with the new content
        if: steps.changes.outputs.n != '0'
        run: |
          npm ci
          npm run build

      - name: Gate — changed sources resolve
        if: steps.changes.outputs.n != '0'
        run: node scripts/check-sources.mjs --changed

      - name: Append usage ledger
        id: ledger
        env:
          EXEC_WRITER: ${{ steps.claude.outputs.execution_file }}
          EXEC_VERIFY: ${{ steps.verify.outputs.execution_file }}
          MODEL: claude-sonnet-5
        run: |
          bash scripts/append-ledger.sh
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        uses: ./.github/actions/commit-and-push
        with:
          paths: signals/ editorial/ src/content/ usage/
          message: "Scout: signals ${{ steps.ledger.outputs.today }}"

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
